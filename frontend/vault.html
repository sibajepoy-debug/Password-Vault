<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault - Password Vault</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="vault-header">
            <h1>My Vault</h1>
            <div class="user-info">
                <span id="userName" class="user-name-highlight">Loading...</span>
                <button id="logoutBtn" class="btn btn-secondary">Logout</button>
            </div>
        </header>
        
        <div class="vault-content">
            <div class="password-list" id="passwordList">
                <!-- Password entries will be loaded here -->
            </div>
            
            <div class="add-password">
                <h3>Add New Password</h3>
                <form id="addPasswordForm">
                    <div class="form-row">
                        <input type="text" id="site" placeholder="Website" required>
                        <input type="text" id="username" placeholder="Username" required>
                    </div>
                    <div class="form-row">
                        <input type="password" id="password" placeholder="Password" required>
                        <button type="submit" class="btn btn-primary">Add Password</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="loading" class="loading hidden">Loading vault...</div>
        <div id="error" class="error hidden"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
